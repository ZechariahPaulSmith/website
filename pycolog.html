<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYCOLOG Short Film</title>
    <link rel="stylesheet" href="movie-page.css">
</head>
<style>
:root {
    --dark-text: #00b5ce;
    --light-text: #00b5ce;
    --bg: white;
}
</style>
<body>
    <header style="background: #f2e8cf;">
        <div class="container">
            <img src="images/PYCOLOG/website-art/1.png" alt="" id="one">
            <img src="images/PYCOLOG/website-art/2.png" alt="" id="two">
            <img src="images/PYCOLOG/website-art/3.png" alt="" id="three">
            <img src="images/PYCOLOG/website-art/4.png" alt="" id="four">
            <img src="images/PYCOLOG/website-art/5.png" style="opacity: 0.9" alt="" id="five">
        </div>
    </header>
    <main style="background: #163e25;">
        <section>
            <h2>SYNOPSIS</h2>
            <p>Based on an article in a company-run newspaper from Lincoln, New Hampshire, the film explores the rapid development of technology and the hope for a better tomorrow.</p>
            <hr>
            <h2>GALLERY</h2>
            <div class="gallery-row">
                <img src="images/PYCOLOG/pycolog (1).png" </img>
                <img src="images/PYCOLOG/pycolog (2).png" </img>
                <img src="images/PYCOLOG/pycolog (4).png" </img>
            </div>
            <hr>
            <h2>ANIMATIC</h2>
            <div style="display: flex; justify-content: center; align-content: center; align-items: center;">
              <video controls width="1280" height="720"src="videos/final_attempt_one.mp4" autoplay poster="posterimage.jpg" style="border-radius: 25px;">
                Your browser does not support HTML5 video :(
              </video>
            </div>
            <h2>PROJECT IN DEVELOPMENT</h2>
        </section>
    </main>
    <script>
        const one = document.getElementById("one");
        const two = document.getElementById("two");
        const three = document.getElementById("three");
        const four = document.getElementById("four");
        const five = document.getElementById("five");

        document.addEventListener("scroll", () => {
            let value = window.scrollY;

            two.style.bottom = -value * 0.4 + "px";
            three.style.bottom = -value * 0.6 + "px";
            four.style.bottom = -value * 0.8 + "px";
            five.style.bottom = -value * 0.9 + "px";
            five.style.right = -value * 0.05 + "px";
        })
    </script>
</body>
<footer style="background: #163e25;">
  <p style="font-size: 20px;">ZechariahPaulSmith@gmail.com</p>
  <p style="font-size: 20px;"> Copyright 2026</p>
</footer>
</html>
